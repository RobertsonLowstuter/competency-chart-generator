<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competency Chart Generator</title>
  <style>
    :root {
      --self: #7b2222;
      --avg: #1f4e79;
      --range: #cfe8f3;
      --grid: #d7d7d7;
      --baseline: #eeeeee;
      --text: #333;
      --muted: #666;
      --border: #cfcfcf;
      --panel: #f8f8f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: #fff;
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 28px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 700;
    }

    .note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 16px;
      border: 1px solid #999;
      background: #f3f3f3;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    button:hover {
      background: #e9e9e9;
    }

    .clear-btn {
      background: #fafafa;
    }

    .table-wrap {
      overflow-x: auto;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      background: #fff;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    th, td {
      border-bottom: 1px solid #e5e5e5;
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: var(--panel);
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .delete-btn {
      padding: 6px 10px;
      font-size: 13px;
    }

    .legend {
      display: inline-flex;
      gap: 24px;
      align-items: center;
      border: 1px solid #7d8fa3;
      padding: 12px 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      background: #fff;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.self { background: var(--self); }
    .dot.avg { background: var(--avg); }

    .range-box {
      width: 24px;
      height: 12px;
      background: var(--range);
      display: inline-block;
    }

    .delta-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 18px;
      padding: 0 6px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      font-weight: 700;
      color: #333;
      line-height: 1;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .chart-panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      background: #fff;
    }

    #chart {
      width: 100%;
      min-width: 1120px;
      display: block;
    }

    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .baseline-bar {
      fill: var(--baseline);
    }

    .axis-label {
      font-size: 12px;
      fill: #666;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .row-label {
      font-size: 14px;
      font-weight: 700;
      fill: #444;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .range-bar {
      fill: var(--range);
    }

    .self-dot {
      fill: var(--self);
    }

    .avg-dot {
      fill: var(--avg);
    }

    .self-label {
      fill: var(--self);
      font-size: 15px;
      font-weight: 700;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .avg-label {
      fill: var(--avg);
      font-size: 15px;
      font-weight: 700;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .nr-label,
    .delta-label {
      font-size: 13px;
      fill: #333;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .delta-value {
      font-weight: 700;
    }

    .column-header {
      font-size: 12px;
      font-weight: 700;
      fill: #555;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .empty-state {
      font-size: 16px;
      fill: #888;
      font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
    }

    .label-guide {
      stroke-width: 1.25;
      fill: none;
      opacity: 0.9;
    }

    .label-guide-self {
      stroke: var(--self);
    }

    .label-guide-avg {
      stroke: var(--avg);
    }

    .active-layout {
      border-color: #1f4e79;
      background: #eaf2f9;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Competency Chart Generator</h1>
    <p class="note">N/R: Number of interviewees who did not respond with a rating.</p>

    <section class="controls">
      <button type="button" onclick="addRow()">Add Row</button>
      <button type="button" onclick="generateChart()">Generate Chart</button>
      <button type="button" onclick="document.getElementById('fileUpload').click()">Upload File</button>
      <button type="button" onclick="downloadChart()">Download PNG</button>
      <button type="button" id="wordLayoutBtn" onclick="toggleWordLayout()">Word Layout</button>
      <button type="button" class="clear-btn" onclick="clearChartData()">Clear Chart</button>

      <input
        type="file"
        id="fileUpload"
        accept=".csv,.tsv,.txt"
        style="display:none"
        onchange="handleDataUpload(event)"
      />
    </section>

    <section class="table-wrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th style="width: 30%;">Category</th>
            <th>Self</th>
            <th>Average</th>
            <th>Min</th>
            <th>Max</th>
            <th>N/R</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="legend">
      <div class="legend-item"><span class="dot self"></span> Self Rating</div>
      <div class="legend-item"><span class="dot avg"></span> Average Rating</div>
      <div class="legend-item"><span class="range-box"></span> Range of Responses</div>
      <div class="legend-item"><span class="delta-chip">Δ</span> Difference between Self and Average Rating</div>
    </section>

    <section class="chart-panel">
      <svg id="chart"></svg>
    </section>
  </main>

  <script>
    const tbody = document.querySelector("#dataTable tbody");
    const NS = "http://www.w3.org/2000/svg";
    let isWordLayout = false;

    const starterData = [
      { label: "Technical Expertise in Role", self: "", avg: 6.9, min: 6, max: 10, nr: 1 },
      { label: "Strategic Capabilities", self: 3, avg: 6.4, min: 7, max: 10, nr: 2 },
      { label: "Decision-Making Abilities", self: 6.7, avg: 6.7, min: 7, max: 10, nr: 3 },
      { label: "Innovation", self: 6.0, avg: 6.0, min: 6, max: 10, nr: 4 },
      { label: "Level of Executive Presence", self: 6.6, avg: 6.6, min: 5, max: 10, nr: 5 },
      { label: "Ability to Execute", self: 6, avg: 6.2, min: 5, max: 9, nr: 1 },
      { label: "Delegation", self: "", avg: 6.5, min: 5, max: 10, nr: 2 }
    ];

    function addRow(values = {}) {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><input type="text" placeholder="Category" value="${escapeHtml(values.label ?? "")}"></td>
        <td><input type="number" min="0" max="10" step="0.1" value="${values.self ?? ""}"></td>
        <td><input type="number" min="0" max="10" step="0.1" value="${values.avg ?? ""}"></td>
        <td><input type="number" min="0" max="10" step="0.1" value="${values.min ?? ""}"></td>
        <td><input type="number" min="0" max="10" step="0.1" value="${values.max ?? ""}"></td>
        <td><input type="number" min="0" step="1" value="${values.nr ?? ""}"></td>
        <td><button type="button" class="delete-btn" onclick="deleteRow(this)">Delete</button></td>
      `;
      tbody.appendChild(row);
    }

    function deleteRow(button) {
      button.closest("tr").remove();
      generateChart();
    }

    function clearChartData() {
      tbody.innerHTML = "";
      generateChart();
    }

    function toggleWordLayout() {
      isWordLayout = !isWordLayout;
      document.getElementById("wordLayoutBtn").classList.toggle("active-layout", isWordLayout);
      generateChart();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function parseNumber(value) {
      if (value === "" || value === null || value === undefined) return null;
      const num = parseFloat(value);
      return Number.isNaN(num) ? null : num;
    }

    function getData() {
      const rows = document.querySelectorAll("#dataTable tbody tr");

      return Array.from(rows)
        .map((row) => {
          const inputs = row.querySelectorAll("input");
          const label = inputs[0].value.trim();

          const self = parseNumber(inputs[1].value);
          const avg = parseNumber(inputs[2].value);
          const min = parseNumber(inputs[3].value);
          const max = parseNumber(inputs[4].value);
          const nr = parseNumber(inputs[5].value);

          return { label, self, avg, min, max, nr };
        })
        .filter((item) => item.label !== "");
    }

    function addSvgEl(name, attrs = {}, text = "") {
      const el = document.createElementNS(NS, name);
      for (const [key, value] of Object.entries(attrs)) {
        el.setAttribute(key, value);
      }
      if (text !== "") el.textContent = text;
      return el;
    }

    function formatDelta(self, avg) {
      if (self === null || avg === null) return "—";
      const delta = Math.abs(self - avg);
      return (Math.round(delta * 10) / 10).toFixed(1);
    }

    function formatValue(value) {
      if (value === null) return "";
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function drawEmptyState(svg, width, height) {
      svg.appendChild(addSvgEl("text", {
        x: width / 2,
        y: height / 2,
        "text-anchor": "middle",
        class: "empty-state"
      }, "No chart data yet. Add rows or upload a file, then click Generate Chart."));
    }

    function parseDelimitedLine(line, delimiter) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === delimiter && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function detectDelimiter(text) {
      const firstLine = text.split(/\r?\n/).find(line => line.trim() !== "") || "";
      const commaCount = (firstLine.match(/,/g) || []).length;
      const tabCount = (firstLine.match(/\t/g) || []).length;
      return tabCount > commaCount ? "\t" : ",";
    }

    function normalizeHeader(header) {
      return header.trim().toLowerCase().replaceAll("/", "").replace(/\s+/g, "");
    }

    function parseUploadFile(text) {
      const delimiter = detectDelimiter(text);

      const lines = text
        .split(/\r?\n/)
        .filter(line => line.trim() !== "");

      if (lines.length < 2) {
        throw new Error("The file is empty or has no data rows.");
      }

      const rawHeaders = parseDelimitedLine(lines[0], delimiter);
      const headers = rawHeaders.map(normalizeHeader);

      const headerMap = {
        name: "label",
        average: "avg",
        self: "self",
        low: "min",
        high: "max",
        nr: "nr",
        range: "range"
      };

      const required = ["name", "average", "self", "low", "high", "nr"];
      for (const req of required) {
        if (!headers.includes(req)) {
          throw new Error(`Missing required column: ${req}`);
        }
      }

      return lines.slice(1).map(line => {
        const values = parseDelimitedLine(line, delimiter);
        const row = {};

        headers.forEach((header, index) => {
          row[headerMap[header] || header] = values[index] ?? "";
        });

        return {
          label: row.label || "",
          avg: row.avg || "",
          self: row.self || "",
          min: row.min || "",
          max: row.max || "",
          nr: row.nr || ""
        };
      }).filter(row => row.label !== "");
    }

    function handleDataUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const text = e.target.result;
          const rows = parseUploadFile(text);

          tbody.innerHTML = "";
          rows.forEach(row => addRow(row));
          generateChart();

          event.target.value = "";
        } catch (error) {
          alert("Could not read file: " + error.message);
        }
      };

      reader.readAsText(file);
    }

    function downloadChart() {
      const svg = document.getElementById("chart");

      if (!svg || !svg.innerHTML.trim()) {
        alert("Generate a chart first.");
        return;
      }

      const svgClone = svg.cloneNode(true);

      svgClone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
      svgClone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");

      const style = document.createElementNS(NS, "style");
      style.textContent = `
        text {
          font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif;
        }
        .grid-line { stroke: ${getComputedStyle(document.documentElement).getPropertyValue('--grid')}; stroke-width: 1; }
        .baseline-bar { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--baseline')}; }
        .axis-label { font-size: 12px; fill: #666; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .row-label { font-size: 14px; font-weight: 700; fill: #444; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .range-bar { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--range')}; }
        .self-dot { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--self')}; }
        .avg-dot { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--avg')}; }
        .self-label { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--self')}; font-size: 15px; font-weight: 700; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .avg-label { fill: ${getComputedStyle(document.documentElement).getPropertyValue('--avg')}; font-size: 15px; font-weight: 700; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .nr-label, .delta-label { font-size: 13px; fill: #333; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .delta-value { font-weight: 700; }
        .column-header { font-size: 12px; font-weight: 700; fill: #555; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
        .label-guide { stroke-width: 1.25; fill: none; opacity: 0.9; }
        .label-guide-self { stroke: ${getComputedStyle(document.documentElement).getPropertyValue('--self')}; }
        .label-guide-avg { stroke: ${getComputedStyle(document.documentElement).getPropertyValue('--avg')}; }
        .empty-state { font-size: 16px; fill: #888; font-family: Calibri, Candara, "Segoe UI", Arial, sans-serif; }
      `;
      svgClone.insertBefore(style, svgClone.firstChild);

      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(svgClone);

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const img = new Image();

      const vb = svg.viewBox.baseVal;
      const exportScale = 2;

      canvas.width = vb.width * exportScale;
      canvas.height = vb.height * exportScale;

      const svgBlob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.scale(exportScale, exportScale);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);

        const link = document.createElement("a");
        link.download = isWordLayout ? "competency-chart-word-layout.png" : "competency-chart.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      img.onerror = function() {
        URL.revokeObjectURL(url);
        alert("Could not export chart image.");
      };

      img.src = url;
    }

    function generateChart() {
      const rawData = getData();

      const data = rawData
        .map((item) => {
          let min = item.min;
          let max = item.max;

          if (min !== null && max !== null && min > max) {
            [min, max] = [max, min];
          }

          return { ...item, min, max };
        })
        .sort((a, b) => {
          const aAvg = a.avg === null ? -Infinity : a.avg;
          const bAvg = b.avg === null ? -Infinity : b.avg;
          return bAvg - aAvg;
        });

      const svg = document.getElementById("chart");
      svg.innerHTML = "";

      const width = isWordLayout ? 900 : 1180;

      const margin = isWordLayout
        ? { top: 60, right: 100, bottom: 60, left: 300 }
        : { top: 58, right: 120, bottom: 56, left: 360 };

      const rowHeight = isWordLayout ? 64 : 74;
      const plotHeight = Math.max(data.length * rowHeight, isWordLayout ? 140 : 160);
      const height = margin.top + plotHeight + margin.bottom;

      const plotWidth = isWordLayout ? 420 : 520;
      const chartLeft = margin.left;
      const chartRight = chartLeft + plotWidth;

      const nrX = chartRight + (isWordLayout ? 24 : 28);
      const deltaX = chartRight + (isWordLayout ? 68 : 82);

      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.setAttribute("height", height);

      if (data.length === 0) {
        drawEmptyState(svg, width, height);
        return;
      }

      function xScale(value) {
        return chartLeft + (value / 10) * plotWidth;
      }

      for (let i = 0; i <= 10; i++) {
        const x = xScale(i);

        svg.appendChild(addSvgEl("line", {
          x1: x,
          y1: margin.top - 18,
          x2: x,
          y2: margin.top + plotHeight,
          class: "grid-line"
        }));

        svg.appendChild(addSvgEl("text", {
          x,
          y: margin.top + plotHeight + 28,
          "text-anchor": "middle",
          class: "axis-label"
        }, String(i)));
      }

      svg.appendChild(addSvgEl("text", {
        x: nrX,
        y: margin.top - 28,
        class: "column-header"
      }, "N/R"));

      svg.appendChild(addSvgEl("text", {
        x: deltaX,
        y: margin.top - 28,
        class: "column-header"
      }, "Δ"));

      data.forEach((d, index) => {
        const y = margin.top + index * rowHeight + rowHeight / 2;

        svg.appendChild(addSvgEl("text", {
          x: chartLeft - 14,
          y: y + 5,
          "text-anchor": "end",
          class: "row-label"
        }, d.label));

        svg.appendChild(addSvgEl("rect", {
          x: chartLeft,
          y: y - 11,
          width: plotWidth,
          height: 22,
          rx: 0,
          class: "baseline-bar"
        }));

        if (d.min !== null && d.max !== null) {
          svg.appendChild(addSvgEl("rect", {
            x: xScale(d.min),
            y: y - 11,
            width: Math.max(xScale(d.max) - xScale(d.min), 0),
            height: 22,
            rx: 0,
            class: "range-bar"
          }));
        }

        const selfExists = d.self !== null;
        const avgExists = d.avg !== null;

        const selfX = selfExists ? xScale(d.self) : null;
        const avgX = avgExists ? xScale(d.avg) : null;

        let selfDotY = y;
        let avgDotY = y;

        let selfLabelY = y + 28;
        let avgLabelY = y - 18;

        let selfGuide = false;
        let avgGuide = false;

        if (selfExists && !avgExists) {
          selfLabelY = y + 26;
        }

        if (!selfExists && avgExists) {
          avgLabelY = y - 16;
        }

        if (selfExists && avgExists) {
          const gap = Math.abs(selfX - avgX);

          if (gap < 18) {
            avgDotY = y - 6;
            selfDotY = y + 6;
            avgLabelY = y - 26;
            selfLabelY = y + 38;
            avgGuide = true;
            selfGuide = true;
          } else if (gap < 34) {
            avgLabelY = y - 24;
            selfLabelY = y + 34;
            avgGuide = true;
            selfGuide = true;
          }
        }

        if (avgExists && avgGuide) {
          svg.appendChild(addSvgEl("line", {
            x1: avgX,
            y1: avgDotY - 8,
            x2: avgX,
            y2: avgLabelY + 4,
            class: "label-guide label-guide-avg"
          }));
        }

        if (selfExists && selfGuide) {
          svg.appendChild(addSvgEl("line", {
            x1: selfX,
            y1: selfDotY + 8,
            x2: selfX,
            y2: selfLabelY - 16,
            class: "label-guide label-guide-self"
          }));
        }

        if (avgExists) {
          svg.appendChild(addSvgEl("circle", {
            cx: avgX,
            cy: avgDotY,
            r: 7,
            class: "avg-dot"
          }));

          svg.appendChild(addSvgEl("text", {
            x: avgX,
            y: avgLabelY,
            "text-anchor": "middle",
            class: "avg-label"
          }, formatValue(d.avg)));
        }

        if (selfExists) {
          svg.appendChild(addSvgEl("circle", {
            cx: selfX,
            cy: selfDotY,
            r: 7,
            class: "self-dot"
          }));

          svg.appendChild(addSvgEl("text", {
            x: selfX,
            y: selfLabelY,
            "text-anchor": "middle",
            class: "self-label"
          }, formatValue(d.self)));
        }

        svg.appendChild(addSvgEl("text", {
          x: nrX,
          y: y + 5,
          class: "nr-label"
        }, `${d.nr ?? 0}`));

        svg.appendChild(addSvgEl("text", {
          x: deltaX,
          y: y + 5,
          class: "delta-label delta-value"
        }, formatDelta(d.self, d.avg)));
      });
    }

    starterData.forEach(addRow);
    generateChart();
  </script>
</body>
</html>
